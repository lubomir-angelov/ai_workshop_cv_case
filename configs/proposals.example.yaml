pose:
  model_path: "models/pose_detector.pt"
  target_fps: 8
  image_size: 640
  device: "auto"
  half: false
  pose_confidence: 0.30
  max_detections: 100
  process_active_spans_only: true

actor_association:
  min_actor_confidence: 0.30
  match_iou_threshold: 0.15
  max_gap_s: 0.5
  allow_unmatched: true

region_measurements:
  expanded_margin_override: null
  min_wrist_confidence: 0.30
  min_dwell_duration_s: 0.25
  velocity_window_frames: 5
  reversal_threshold: 0.30
  gap_tolerance_s: 0.5

proposals:
  target_fps: 8
  minimum_wrist_confidence: 0.30
  minimum_interaction_duration_s: 0.25
  merge_gap_s: 1.0
  context_before_s: 2.0
  context_after_s: 2.0
  maximum_candidate_duration_s: 10.0
  trajectory_smoothing: false
  smoothing_window: 3

preview:
  preview_fps: 4.0
  max_output_width: 1280
  max_output_height: 720
  draw_actor_box: true
  draw_wrist_positions: true
  draw_region_polygons: true
  draw_region_labels: true
  draw_candidate_intervals: true
  text_scale: 0.5
  line_thickness: 2

